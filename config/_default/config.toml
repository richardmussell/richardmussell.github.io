# Hugo Configuration - Base Settings
baseURL = "https://richardmussell.github.io/"
languageCode = "en-us"
title = "richard mussell eportfolio"
# theme = ""  # No theme - using custom layouts

# Content Settings
contentDir = "content"
staticDir = "static"
publishDir = "public"

# Build Settings - Enterprise Performance & Security
enableRobotsTXT = true
enableGitInfo = false
enableEmoji = true
enableMissingTranslationPlaceholders = false
buildDrafts = false
buildFuture = false
buildExpired = false
ignoreErrors = false
# Security: Disable Hugo generator tag (prevents version disclosure)
disableHugoGeneratorInject = true
# Security: Disable source map generation (prevents source code exposure)
enableSourceMap = false

# Minification - Critical for Core Web Vitals & SEO Ranking
[minify]
  disableCSS = false
  disableHTML = false
  disableJS = false
  disableJSON = false
  disableSVG = false
  disableXML = false
  minifyOutput = true

# Markup Settings
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = false
  [markup.highlight]
    style = "github"
    lineNos = false

# Image Processing - Performance Optimization (Lighthouse 100/100)
[imaging]
  # Resample filter for best quality (Lanczos is optimal)
  resampleFilter = "Lanczos"
  # Quality for WebP (85 = optimal balance between size and quality)
  quality = 85
  # Anchor point for cropping
  anchor = "Center"
  # Enable AVIF format (modern browsers, smaller files)
  hint = "photo"
  # Default resize settings
  [imaging.resize]
    method = "Lanczos"

# Taxonomies - Portfolio-Optimized Structure
[taxonomies]
  category = "categories"
  tag = "tags"
  skill = "skills"
  technology = "technologies"
  project = "projects"
  caseStudy = "case-studies"

# Sitemap Configuration - SEO Priority Settings
[sitemap]
  changefreq = "monthly"
  priority = 0.5
  filename = "sitemap.xml"
  # Optional: Exclude thin content (uncomment if needed)
  # disabledKinds = ["taxonomy", "term"]

# Sitemap Priorities (Higher = More Important for SEO)
# Homepage gets highest priority for recruiter visibility
[sitemap.priorities]
  homepage = 1.0
  page = 0.8
  section = 0.7
  taxonomy = 0.5  # Lower priority for taxonomies (avoid thin content)
  term = 0.4      # Lower priority for taxonomy terms

# Security Headers (via _headers file)
# Note: CSP and security headers are handled in head.html partial

# Permalinks - Deep, SEO-Friendly URL Structure
[permalinks]
  # Portfolio items: /projects/[slug]/
  projects = "/projects/:slug/"
  # Case studies: /case-studies/[slug]/
  caseStudies = "/case-studies/:slug/"
  # Skills taxonomy: /skills/[slug]/
  skills = "/skills/:slug/"
  # Technologies taxonomy: /technologies/[slug]/
  technologies = "/technologies/:slug/"
  # Default pages maintain current structure
  page = "/:slug/"
  section = "/:section/"

# Performance - Asset Pipeline Optimization
[params]
  # Enable critical CSS inlining
  inlineCriticalCSS = true
  # Enable service worker (PWA support)
  enableServiceWorker = false
  # Preconnect to external domains
  preconnectDomains = ["https://cdnjs.cloudflare.com", "https://formspree.io"]
  
# Build Performance - Parallel Processing
[build]
  # Write stats for analysis
  writeStats = false
  # Resource cache size (default: 1000)
  resourceDir = "resources"

# Output Formats - HTML Optimization
[outputs]
  home = ["HTML", "RSS"]
  page = ["HTML"]
  section = ["HTML", "RSS"]
  
# HTML Output Format - Additional Optimization
[outputFormats]
  [outputFormats.HTML]
    mediaType = "text/html"
    isHTML = true
    isPlainText = false
    permalinkable = true
    # Base name for output files
    baseName = "index"
    # Rel: add canonical, prev, next links
    rel = "canonical"
    
# Menu Configuration - Portfolio Navigation
[menu]
  [[menu.main]]
    identifier = "home"
    name = "Home"
    url = "/"
    weight = 1
  [[menu.main]]
    identifier = "projects"
    name = "Projects"
    url = "/project/"
    weight = 2
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 3
  [[menu.main]]
    identifier = "contact"
    name = "Contact"
    url = "/contact/"
    weight = 4

