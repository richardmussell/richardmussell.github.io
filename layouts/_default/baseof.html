<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang | default "en-us" }}">
<head>
    {{- partial "head.html" . -}}
</head>
<body>
    {{- /* Skip to Content Link - WCAG 2.4.1 (Bypass Blocks) */ -}}
    <a href="#main-content" class="skip-link">Skip to main content</a>
    
    {{- partial "header.html" . -}}
    
    <main id="main-content" class="main-container" role="main">
        {{- block "main" . }}{{- end }}
    </main>
    
    {{- partial "footer.html" . -}}
    
    {{- block "scripts" . }}{{- end }}
</body>
</html>
